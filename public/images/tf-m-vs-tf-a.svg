<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="600" fill="#111827">TF-M vs TF-A — same family, different worlds</text>

  <!-- LEFT PANEL: TF-M -->
  <g transform="translate(20, 60)">
    <rect x="0" y="0" width="420" height="500" rx="8" fill="#fafafa" stroke="#d1d5db" stroke-width="1.5"/>
    <path d="M 0 8 Q 0 0 8 0 L 412 0 Q 420 0 420 8 L 420 40 L 0 40 Z" fill="#1f2937"/>
    <text x="210" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#ffffff">TF-M — Cortex-M (Armv8-M)</text>

    <text x="20" y="65" font-size="11" font-weight="700" fill="#6b7280">BOOT</text>
    <g transform="translate(20, 78)">
      <rect x="0" y="0" width="110" height="36" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
      <text x="55" y="17" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">BL2</text>
      <text x="55" y="29" text-anchor="middle" font-size="9" fill="#92400e">MCUboot</text>

      <line x1="112" y1="18" x2="124" y2="18" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

      <rect x="128" y="0" width="110" height="36" rx="4" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
      <text x="183" y="17" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">TF-M</text>
      <text x="183" y="29" text-anchor="middle" font-size="9" fill="#92400e">SPE (secure side)</text>

      <line x1="240" y1="18" x2="252" y2="18" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

      <rect x="256" y="0" width="124" height="36" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
      <text x="318" y="17" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">NSPE app</text>
      <text x="318" y="29" text-anchor="middle" font-size="9" fill="#1e40af">RTOS + application</text>
    </g>

    <text x="20" y="148" font-size="11" font-weight="700" fill="#6b7280">ADDRESS SPACE — split by SAU / IDAU</text>
    <g transform="translate(20, 160)">
      <rect x="0" y="0" width="172" height="170" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
      <text x="86" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">SECURE (SPE)</text>
      <line x1="12" y1="30" x2="160" y2="30" stroke="#d97706" stroke-width="0.5" opacity="0.4"/>
      <text x="86" y="52" text-anchor="middle" font-size="11" fill="#78350f">TF-M core</text>
      <text x="86" y="70" text-anchor="middle" font-size="11" fill="#78350f">Crypto partition</text>
      <text x="86" y="88" text-anchor="middle" font-size="11" fill="#78350f">ITS partition</text>
      <text x="86" y="106" text-anchor="middle" font-size="11" fill="#78350f">Protected Storage</text>
      <text x="86" y="124" text-anchor="middle" font-size="11" fill="#78350f">Initial Attestation</text>
      <text x="86" y="152" text-anchor="middle" font-size="10" font-style="italic" fill="#78350f">Exposes PSA APIs</text>

      <rect x="176" y="65" width="28" height="40" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
      <text x="190" y="82" text-anchor="middle" font-size="9" font-weight="700" fill="#166534">NSC</text>
      <text x="190" y="96" text-anchor="middle" font-size="9" font-weight="700" fill="#166534">vnr</text>

      <rect x="208" y="0" width="172" height="170" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
      <text x="294" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">NON-SECURE (NSPE)</text>
      <line x1="220" y1="30" x2="368" y2="30" stroke="#2563eb" stroke-width="0.5" opacity="0.4"/>
      <text x="294" y="52" text-anchor="middle" font-size="11" fill="#1e3a8a">RTOS (Zephyr / FreeRTOS)</text>
      <text x="294" y="70" text-anchor="middle" font-size="11" fill="#1e3a8a">Application code</text>
      <text x="294" y="88" text-anchor="middle" font-size="11" fill="#1e3a8a">Network stack</text>
      <text x="294" y="106" text-anchor="middle" font-size="11" fill="#1e3a8a">Non-secure drivers</text>
      <text x="294" y="152" text-anchor="middle" font-size="10" font-style="italic" fill="#1e3a8a">Crosses via SG instr.</text>
    </g>

    <text x="20" y="365" font-size="11" font-weight="700" fill="#6b7280">CHARACTERISTICS</text>
    <g transform="translate(20, 378)">
      <text x="0" y="14" font-size="11" fill="#374151">• No exception levels; SAU/IDAU split memory</text>
      <text x="0" y="32" font-size="11" fill="#374151">• MPU-backed isolation between partitions</text>
      <text x="0" y="50" font-size="11" fill="#374151">• NSC veneers + SG instruction cross boundary</text>
      <text x="0" y="68" font-size="11" fill="#374151">• Footprint: tens of KB</text>
      <text x="0" y="86" font-size="11" fill="#374151">• Sensors, wearables, IoT MCUs, smart locks</text>
    </g>
  </g>

  <!-- RIGHT PANEL: TF-A -->
  <g transform="translate(460, 60)">
    <rect x="0" y="0" width="420" height="500" rx="8" fill="#fafafa" stroke="#d1d5db" stroke-width="1.5"/>
    <path d="M 0 8 Q 0 0 8 0 L 412 0 Q 420 0 420 8 L 420 40 L 0 40 Z" fill="#1f2937"/>
    <text x="210" y="26" text-anchor="middle" font-size="16" font-weight="600" fill="#ffffff">TF-A — Cortex-A (Armv8-A)</text>

    <text x="20" y="65" font-size="11" font-weight="700" fill="#6b7280">BOOT CHAIN</text>
    <g transform="translate(20, 78)">
      <rect x="0" y="22" width="58" height="36" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
      <text x="29" y="40" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">BL1</text>
      <text x="29" y="52" text-anchor="middle" font-size="9" fill="#92400e">ROM</text>

      <line x1="60" y1="40" x2="72" y2="40" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

      <rect x="74" y="22" width="58" height="36" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
      <text x="103" y="40" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">BL2</text>
      <text x="103" y="52" text-anchor="middle" font-size="9" fill="#92400e">loader</text>

      <line x1="134" y1="40" x2="146" y2="40" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

      <rect x="148" y="22" width="62" height="36" rx="4" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
      <text x="179" y="40" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">BL31</text>
      <text x="179" y="52" text-anchor="middle" font-size="9" fill="#92400e">EL3 runtime</text>

      <path d="M 212 40 L 226 40 M 226 16 L 226 64 M 226 16 L 238 16 M 226 64 L 238 64" stroke="#6b7280" stroke-width="1.5" fill="none"/>
      <polygon points="238,12 246,16 238,20" fill="#6b7280"/>
      <polygon points="238,60 246,64 238,68" fill="#6b7280"/>

      <rect x="248" y="0" width="132" height="32" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
      <text x="314" y="15" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">BL32 — OP-TEE</text>
      <text x="314" y="26" text-anchor="middle" font-size="9" fill="#92400e">secure payload</text>

      <rect x="248" y="48" width="132" height="32" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
      <text x="314" y="63" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">BL33 — U-Boot</text>
      <text x="314" y="74" text-anchor="middle" font-size="9" fill="#1e40af">non-secure loader</text>
    </g>

    <text x="20" y="178" font-size="11" font-weight="700" fill="#6b7280">RUNTIME STACK — exception levels</text>
    <g transform="translate(20, 188)">
      <rect x="0" y="0" width="380" height="38" rx="4" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
      <text x="190" y="17" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">EL3 — BL31 Secure Monitor</text>
      <text x="190" y="31" text-anchor="middle" font-size="10" fill="#78350f">SMC handler · PSCI · world switching</text>

      <rect x="0" y="44" width="186" height="44" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
      <text x="93" y="62" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">S-EL1</text>
      <text x="93" y="78" text-anchor="middle" font-size="10" fill="#78350f">OP-TEE kernel</text>

      <rect x="194" y="44" width="186" height="44" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
      <text x="287" y="62" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">EL1</text>
      <text x="287" y="78" text-anchor="middle" font-size="10" fill="#1e3a8a">Linux kernel</text>

      <rect x="0" y="92" width="186" height="44" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
      <text x="93" y="110" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">S-EL0</text>
      <text x="93" y="126" text-anchor="middle" font-size="10" fill="#78350f">Trusted Apps (TAs)</text>

      <rect x="194" y="92" width="186" height="44" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
      <text x="287" y="110" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">EL0</text>
      <text x="287" y="126" text-anchor="middle" font-size="10" fill="#1e3a8a">User applications</text>

      <text x="93" y="152" text-anchor="middle" font-size="9" font-style="italic" fill="#78350f">SECURE WORLD</text>
      <text x="287" y="152" text-anchor="middle" font-size="9" font-style="italic" fill="#1e3a8a">NON-SECURE WORLD</text>
    </g>

    <text x="20" y="365" font-size="11" font-weight="700" fill="#6b7280">CHARACTERISTICS</text>
    <g transform="translate(20, 378)">
      <text x="0" y="14" font-size="11" fill="#374151">• Privilege via exception levels (EL0–EL3)</text>
      <text x="0" y="32" font-size="11" fill="#374151">• MMU-backed isolation, full secure OS</text>
      <text x="0" y="50" font-size="11" fill="#374151">• SMC calls cross the secure boundary</text>
      <text x="0" y="68" font-size="11" fill="#374151">• Footprint: megabytes</text>
      <text x="0" y="86" font-size="11" fill="#374151">• Phones, automotive SoCs, gateways, servers</text>
    </g>
  </g>
</svg>
